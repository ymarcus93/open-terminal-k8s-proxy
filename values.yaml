replicaCount: 1

image:
  repository: ghcr.io/volkermauel/open-terminal-k8s-proxy
  pullPolicy: Always
  tag: main

terminalImage:
  repository: ghcr.io/open-webui/open-terminal
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

terminalResources:
  requests:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 5Gi
  limits:
    cpu: 1000m
    memory: 4Gi
    ephemeral-storage: 5Gi

terminalNodeSelector: {}
terminalTolerations: []

storage:
  mode: none
  className: ""
  perUser:
    size: 5Gi
  shared:
    size: 100Gi

maxConcurrentPods: 100
podIdleTimeoutSeconds: 3600
podStartupTimeoutSeconds: 60
podCleanupIntervalSeconds: 60

proxyApiKey: ""

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

nodeSelector: {}
tolerations: []
affinity: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

terminalSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

imagePullSecrets: []
