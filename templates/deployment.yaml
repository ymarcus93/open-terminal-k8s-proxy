apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "name" . }}
  labels:
    app.kubernetes.io/name: {{ include "name" . }}
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "name" . }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "name" .) }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: PROXY_API_KEY
              value: {{ .Values.proxyApiKey | quote }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TERMINAL_IMAGE
              value: "{{ .Values.terminalImage.repository }}:{{ .Values.terminalImage.tag }}"
            - name: TERMINAL_IMAGE_PULL_POLICY
              value: {{ .Values.terminalImage.pullPolicy }}
            - name: TERMINAL_CPU_REQUEST
              value: {{ .Values.terminalResources.requests.cpu }}
            - name: TERMINAL_CPU_LIMIT
              value: {{ .Values.terminalResources.limits.cpu }}
            - name: TERMINAL_MEMORY_REQUEST
              value: {{ .Values.terminalResources.requests.memory }}
            - name: TERMINAL_MEMORY_LIMIT
              value: {{ .Values.terminalResources.limits.memory }}
            - name: TERMINAL_EPHEMERAL_STORAGE_REQUEST
              value: {{ index .Values.terminalResources.requests "ephemeral-storage" | default "" | quote }}
            - name: TERMINAL_EPHEMERAL_STORAGE_LIMIT
              value: {{ index .Values.terminalResources.limits "ephemeral-storage" | default "" | quote }}
            - name: TERMINAL_NODE_SELECTOR
              value: {{ .Values.terminalNodeSelector | toJson | quote }}
            - name: TERMINAL_TOLERATIONS
              value: {{ .Values.terminalTolerations | toJson | quote }}
            - name: STORAGE_MODE
              value: {{ .Values.storage.mode }}
            - name: STORAGE_CLASS_NAME
              value: {{ .Values.storage.className | default "" }}
            - name: STORAGE_PER_USER_SIZE
              value: {{ .Values.storage.perUser.size }}
            - name: STORAGE_SHARED_SIZE
              value: {{ .Values.storage.shared.size }}
            - name: MAX_CONCURRENT_PODS
              value: "{{ .Values.maxConcurrentPods }}"
            - name: POD_IDLE_TIMEOUT_SECONDS
              value: "{{ .Values.podIdleTimeoutSeconds }}"
            - name: POD_STARTUP_TIMEOUT_SECONDS
              value: "{{ .Values.podStartupTimeoutSeconds }}"
            - name: POD_CLEANUP_INTERVAL_SECONDS
              value: "{{ .Values.podCleanupIntervalSeconds }}"
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            runAsGroup: {{ .Values.securityContext.runAsGroup }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              drop:
                {{- toYaml .Values.securityContext.capabilities.drop | nindent 18 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      affinity: {{ toYaml .Values.affinity | nindent 8 }}
      tolerations: {{ toYaml .Values.tolerations | nindent 8 }}
