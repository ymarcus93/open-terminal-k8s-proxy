apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: { { include "name" . } }
  labels:
    app.kubernetes.io/name: { { include "name" . } }
    app.kubernetes.io/managed-by: Helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: { { include "name" . } }
subjects:
  - kind: ServiceAccount
    name: { { .Values.serviceAccount.name | default (include "name" .) } }
